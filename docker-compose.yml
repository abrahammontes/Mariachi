services:
  mariachi:
    image: mariachi-app:latest
    container_name: mariachi_app
    restart: unless-stopped
    ports:
      - "8125:3000"
    environment:
      - NODE_ENV=production
    labels:
      - "com.docker.compose.project=mariachi-nuevo-tecalitlan"
      - "com.docker.compose.service=mariachi"
